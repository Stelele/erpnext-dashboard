services:
  erpnext-dashboard:
    image: stelele/erpnext-dashboard:latest
    container_name: erpnext-dashboard
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - erpnext_data:/app/data
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - Identity__ClientSecret={{IDENTITY_CLIENTSECRET}}
      - MediatR__LicenseKey={{MEDIATR_LICENSEKEY}}
      - R2__AccountId={{R2_ACCOUNT_ID}}
      - R2__AccessKeyId={{R2_ACCESS_KEY_ID}}
      - R2__SecretAccessKey={{R2_SECRET_ACCESS_KEY}}
      - R2__BackupBucketName={{R2_BACKUP_BUCKET_NAME}}
      - R2__PublicBucketName={{R2_PUBLIC_BUCKET_NAME}}
      - R2__CDNBaseUrl={{R2_CDN_BASE_URL}}
      - R2__SyncIntervalMinutes={{R2_SYNC_INTERVAL}}
      - Auth0__Domain={{AUTH0_DOMAIN}}
      - Auth0__Audience={{AUTH0_AUDIENCE}}
      - Auth0__Apps__ERP-Dashboard={{AUTH0_APP_ERP_DASHBOARD}}
      - ConnectionStrings__Sqlite=Data Source=/app/data/erpnext.db

volumes:
  erpnext_data:
    name: erpnext_data
    external: true
